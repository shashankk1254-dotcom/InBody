<script>

const cSelect = document.getElementById('catSelect');

// INIT
Object.keys(masterDB).forEach(cat => {
    if(cat !== "All models"){
        cSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
    }
});

// STEP 1 → LOAD ISSUES
function updateIssues() {
    const cat = cSelect.value;
    const grid = document.getElementById('issueGrid');

    grid.innerHTML = '';
    partsSection.style.display = 'none';

    if (!cat) {
        issueSection.style.display = 'none';
        return;
    }

    issueSection.style.display = 'block';

    Object.keys(masterDB[cat]).forEach(issue => {
        const el = document.createElement('div');
        el.className = 'btn-issue';
        el.innerText = issue;

        el.onclick = () => selectIssue(cat, issue, el);

        grid.appendChild(el);
    });

    resetTotals();
}

// STEP 2 → SELECT ISSUE
function selectIssue(cat, issue, el) {
    document.querySelectorAll('.btn-issue').forEach(b => b.classList.remove('active'));
    el.classList.add('active');

    loadParts(cat, issue);
}

// STEP 3 → LOAD PARTS (MERGED WITH SERVICE)
function loadParts(cat, issue) {
    partsSection.style.display = 'block';

    const tbody = document.getElementById('pBody');
    tbody.innerHTML = '';

    const parts = [
        ...(masterDB["All models"]?.["Basic Service"] || []),
        ...(masterDB[cat]?.[issue] || [])
    ];

    parts.forEach(p => {
        tbody.innerHTML += `
        <tr>
            <td>
                <input type="checkbox" checked class="c-cb"
                data-m="${safe(p.m)}"
                data-t1="${safe(p.t1)}"
                data-t2="${safe(p.t2)}"
                data-g="${safe(p.g)}"
                onchange="calc()">
            </td>
            <td class="part-name">
                ${p.n}
                <small>${p.c || "-"}</small>
            </td>
            <td><span class="gst-badge">${(p.g*100)||0}%</span></td>
            <td>${format(p.m)}</td>
            <td style="color:#003399;font-weight:bold">${format(p.t1)}</td>
            <td>${format(p.t2)}</td>
        </tr>`;
    });

    calc();
}

// CALCULATION
function calc() {
    let m = 0, t1 = 0, t2 = 0;

    document.querySelectorAll('.c-cb:checked').forEach(c => {
        const gst = 1 + parseFloat(c.dataset.g || 0);

        m += parseFloat(c.dataset.m || 0) * gst;
        t1 += parseFloat(c.dataset.t1 || 0) * gst;
        t2 += parseFloat(c.dataset.t2 || 0) * gst;
    });

    document.getElementById('resMSP').innerText = '₹ ' + format(Math.round(m));
    document.getElementById('resT1').innerText = '₹ ' + format(Math.round(t1));
    document.getElementById('resT2').innerText = '₹ ' + format(Math.round(t2));
}

// HELPERS
function format(x){
    return Number(x || 0).toLocaleString();
}

function safe(x){
    return x || 0;
}

function resetTotals(){
    document.getElementById('resMSP').innerText = '₹ 0';
    document.getElementById('resT1').innerText = '₹ 0';
    document.getElementById('resT2').innerText = '₹ 0';
}

</script>
