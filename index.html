<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spare Parts Calculator</title>

<style>
body {
    font-family: "Segoe UI", sans-serif;
    background: #f5f6f8;
    margin: 0;
}

.app {
    max-width: 900px;
    margin: 30px auto;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
    font-weight: 600;
    border-bottom: 1px solid #eee;
}

/* DEVICE PILLS */
.device-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 20px;
}

.device-pill {
    padding: 8px 14px;
    border-radius: 20px;
    background: #eef2f7;
    cursor: pointer;
    font-size: 14px;
}

.device-pill.active {
    background: #2c3e50;
    color: white;
}

/* ISSUE CARDS */
.issue-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    padding: 0 20px 20px;
}

.issue-card {
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #eee;
    cursor: pointer;
    background: #fafafa;
}

.issue-card.active {
    border-color: #2c3e50;
    background: #eef2f7;
}

/* PARTS */
.parts {
    padding: 20px;
}

.part {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #eee;
}

/* CART */
.cart {
    background: #fafafa;
    padding: 20px;
    border-top: 1px solid #eee;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

button {
    padding: 4px 8px;
    border: none;
    cursor: pointer;
    background: #ddd;
}

.total {
    font-weight: bold;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">Spare Parts Calculator</div>

<!-- DEVICES -->
<div class="device-list" id="devices"></div>

<!-- ISSUES -->
<div class="issue-list" id="issues"></div>

<!-- PARTS -->
<div class="parts" id="parts"></div>

<!-- CART -->
<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<div class="total" id="total">₹ 0</div>
</div>

</div>

<script>

// 🔥 YOUR DB (ADD 380 SAME FORMAT)
const masterDB = {
"All models": {
    "Basic Service": [
        {n:"Service Charge",t1:3500,t2:4000,g:0.18},
        {n:"Unit Calibration",t1:3000,t2:4000,g:0.18}
    ]
},

"InBody 270": {
    "LCD Not Working": [
        {n:"LCD Panel",t1:8730,t2:9970,g:0.05},
        {n:"Display Cable",t1:880,t2:1000,g:0.05}
    ],
    "Weight Issue": [
        {n:"Loadcell",t1:31150,t2:35600,g:0.05}
    ]
},

"InBody 580": {
    "LCD Not Working": [
        {n:"Board LNO39",t1:29160,t2:33330,g:0.05}
    ]
}
};

let selectedDevice = null;
let selectedIssue = null;
let cart = [];

// INIT DEVICES
function init() {
    const container = document.getElementById("devices");

    Object.keys(masterDB).forEach(d => {
        if (d === "All models") return;

        container.innerHTML += `
            <div class="device-pill" onclick="selectDevice('${d}', this)">
                ${d}
            </div>
        `;
    });
}
init();

// SELECT DEVICE
function selectDevice(device, el) {
    selectedDevice = device;
    selectedIssue = null;

    document.querySelectorAll('.device-pill').forEach(e => e.classList.remove('active'));
    el.classList.add('active');

    loadIssues();
}

// LOAD ISSUES
function loadIssues() {
    const container = document.getElementById("issues");
    container.innerHTML = "";

    Object.keys(masterDB[selectedDevice]).forEach(issue => {
        container.innerHTML += `
            <div class="issue-card" onclick="selectIssue('${issue}', this)">
                ${issue}
            </div>
        `;
    });

    document.getElementById("parts").innerHTML = "";
}

// SELECT ISSUE
function selectIssue(issue, el) {
    selectedIssue = issue;

    document.querySelectorAll('.issue-card').forEach(e => e.classList.remove('active'));
    el.classList.add('active');

    loadParts();
}

// LOAD PARTS (SERVICE + ISSUE)
function loadParts() {
    const parts = [
        ...(masterDB["All models"]["Basic Service"]),
        ...(masterDB[selectedDevice][selectedIssue])
    ];

    const container = document.getElementById("parts");
    container.innerHTML = "<h3>Frequent Spare Parts</h3>";

    parts.forEach(p => {
        container.innerHTML += `
            <div class="part">
                ${p.n} - ₹${p.t1}
                <span>
                    <button onclick="addToCart('${p.n}', ${p.t1}, ${p.g})">Add</button>
                </span>
            </div>
        `;
    });
}

// CART LOGIC
function addToCart(name, price, gst) {
    const existing = cart.find(i => i.name === name);
    if (existing) existing.qty++;
    else cart.push({name, price, qty:1, gst});

    renderCart();
}

function changeQty(name, d) {
    const item = cart.find(i => i.name === name);
    item.qty += d;
    if(item.qty <= 0) cart = cart.filter(i => i.name !== name);
    renderCart();
}

function renderCart() {
    let totalVal = 0;
    cartItems.innerHTML = "";

    cart.forEach(item => {
        const val = item.price * item.qty * (1 + item.gst);
        totalVal += val;

        cartItems.innerHTML += `
            <div class="cart-item">
                ${item.name} × ${item.qty} = ₹${Math.round(val)}
                <div>
                    <button onclick="changeQty('${item.name}',-1)">-</button>
                    <button onclick="changeQty('${item.name}',1)">+</button>
                </div>
            </div>
        `;
    });

    document.getElementById("total").innerText = "₹ " + Math.round(totalVal);
}

</script>

</body>
</html>
