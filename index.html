<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spare Parts Calculator</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    margin: 0;
}

.app {
    max-width: 900px;
    margin: auto;
    background: white;
    border-radius: 20px;
    overflow: hidden;
}

.header {
    background: #003399;
    color: white;
    padding: 20px;
    text-align: center;
}

.section {
    padding: 20px;
}

select {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
}

.parts {
    margin-top: 20px;
}

.part {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #eee;
}

button {
    padding: 6px 10px;
    background: #003399;
    color: white;
    border: none;
    cursor: pointer;
}

.cart {
    background: #121212;
    color: white;
    padding: 20px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
    <h2>Spare Parts Calculator</h2>
</div>

<div class="section">
    <label>Device</label>
    <select id="device" onchange="loadIssues()"></select>

    <label>Issue</label>
    <select id="issue" onchange="loadSubIssues()"></select>

    <label>Sub Issue</label>
    <select id="subIssue" onchange="loadParts()"></select>

    <label>Pricing Tier</label>
    <select id="tier" onchange="loadParts()">
        <option value="t1">Tier 1</option>
        <option value="t2">Tier 2</option>
    </select>

    <div class="parts" id="parts"></div>
</div>

<div class="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <h2 id="total">₹ 0</h2>
</div>

</div>

<script>

// 🔥 THIS WILL COME FROM YOUR EXCEL (convert to JSON)
const DB = [
    {
        device: "InBody 270",
        issue: "Display",
        subIssue: "Screen not working",
        part: "LCD Panel",
        t1: 5000,
        t2: 6000
    },
    {
        device: "InBody 270",
        issue: "Display",
        subIssue: "Screen not working",
        part: "Display Cable",
        t1: 800,
        t2: 1000
    },
    {
        device: "InBody 580",
        issue: "Weight",
        subIssue: "Wrong reading",
        part: "Loadcell",
        t1: 25000,
        t2: 30000
    }
];

// CART
let cart = [];

// INIT DEVICES
function init() {
    const devices = [...new Set(DB.map(d => d.device))];
    device.innerHTML = '<option>Select</option>';
    devices.forEach(d => device.innerHTML += `<option>${d}</option>`);
}
init();

// STEP 1 → ISSUE
function loadIssues() {
    const selected = device.value;
    const issues = [...new Set(DB.filter(d => d.device === selected).map(d => d.issue))];

    issue.innerHTML = '<option>Select</option>';
    issues.forEach(i => issue.innerHTML += `<option>${i}</option>`);
}

// STEP 2 → SUB ISSUE
function loadSubIssues() {
    const selectedDevice = device.value;
    const selectedIssue = issue.value;

    const subIssues = [...new Set(
        DB.filter(d => d.device === selectedDevice && d.issue === selectedIssue)
        .map(d => d.subIssue)
    )];

    subIssue.innerHTML = '<option>Select</option>';
    subIssues.forEach(s => subIssue.innerHTML += `<option>${s}</option>`);
}

// STEP 3 → PARTS
function loadParts() {
    const d = device.value;
    const i = issue.value;
    const s = subIssue.value;
    const tierVal = tier.value;

    const filtered = DB.filter(x =>
        x.device === d &&
        x.issue === i &&
        x.subIssue === s
    );

    const container = document.getElementById("parts");
    container.innerHTML = "<h3>Spare Parts</h3>";

    filtered.forEach(p => {
        const price = p[tierVal];

        container.innerHTML += `
            <div class="part">
                ${p.part} - ₹${price}
                <button onclick="addToCart('${p.part}', ${price})">Add</button>
            </div>
        `;
    });
}

// ADD TO CART
function addToCart(name, price) {
    const existing = cart.find(i => i.name === name);

    if (existing) {
        existing.qty++;
    } else {
        cart.push({ name, price, qty: 1 });
    }

    renderCart();
}

// RENDER CART
function renderCart() {
    const container = document.getElementById("cartItems");
    container.innerHTML = "";

    let total = 0;

    cart.forEach(item => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;

        container.innerHTML += `
            <div>
                ${item.name} × ${item.qty} = ₹${itemTotal}
            </div>
        `;
    });

    document.getElementById("total").innerText = "₹ " + total;
}

</script>

</body>
</html>
