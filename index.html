<!DOCTYPE html>
<html>
<head>
    <title>Spare Parts Calculator</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 30px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .cart {
            margin-top: 20px;
            text-align: left;
        }

        .total {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Spare Calculator</h2>

    <!-- Device -->
    <select id="device">
        <option>Select Device</option>
        <option>InBody 270</option>
        <option>InBody 380</option>
        <option>InBody 580</option>
    </select>

    <!-- Issue -->
    <select id="issue">
        <option>Select Issue</option>
        <option>Power Issue</option>
        <option>Display Issue</option>
        <option>Printer Issue</option>
    </select>

    <!-- Sub Issue -->
    <select id="subissue">
        <option>Select Sub Issue</option>
        <option>No Power</option>
        <option>Flickering Screen</option>
        <option>Printer Not Working</option>
    </select>

    <!-- Tier -->
    <select id="tier">
        <option>Select Tier</option>
        <option value="1">Tier 1</option>
        <option value="2">Tier 2</option>
        <option value="3">Tier 3</option>
    </select>

    <button onclick="addToCart()">Add to Cart</button>

    <div class="cart">
        <h3>Cart</h3>
        <ul id="cartList"></ul>
        <div class="total" id="total">Total: ₹0</div>
    </div>
</div>

<script>
let cart = [];
let total = 0;

// Dummy pricing logic (replace with Excel later)
function getSpare(issue, subissue) {
    if(issue === "Power Issue" && subissue === "No Power") {
        return { name: "SMPS Board", price: 2000 };
    }
    if(issue === "Display Issue") {
        return { name: "Display Panel", price: 3500 };
    }
    if(issue === "Printer Issue") {
        return { name: "Printer Module", price: 2500 };
    }
    return { name: "Unknown Spare", price: 0 };
}

function addToCart() {
    let device = document.getElementById("device").value;
    let issue = document.getElementById("issue").value;
    let subissue = document.getElementById("subissue").value;
    let tier = document.getElementById("tier").value;

    let spare = getSpare(issue, subissue);

    // Tier multiplier
    let multiplier = 1;
    if(tier == 2) multiplier = 1.2;
    if(tier == 3) multiplier = 1.5;

    let finalPrice = spare.price * multiplier;

    cart.push({
        device,
        spare: spare.name,
        price: finalPrice
    });

    total += finalPrice;

    renderCart();
}

function renderCart() {
    let list = document.getElementById("cartList");
    list.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item.spare + " - ₹" + item.price;
        list.appendChild(li);
    });

    document.getElementById("total").innerText = "Total: ₹" + total.toFixed(2);
}
</script>

</body>
</html>
