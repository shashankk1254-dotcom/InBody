<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spare Parts Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Segoe UI; background:#f4f6f9; }
.app { max-width:900px; margin:auto; background:white; border-radius:15px; }
.header { background:#eef2f7; padding:20px; text-align:center; font-weight:600; }
.section { padding:20px; }
select { width:100%; padding:10px; margin-top:8px; }
.part { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; }
button { background:#4a90e2; color:white; border:none; padding:6px 10px; cursor:pointer; }
.cart { background:#fafafa; padding:20px; border-top:1px solid #ddd; }
.cart-item { display:flex; justify-content:space-between; margin-bottom:10px; }
</style>
</head>

<body>

<div class="app">
<div class="header">Spare Parts Calculator</div>

<div class="section">
<select id="device" onchange="loadIssues()"></select>
<select id="issue" onchange="loadSubIssues()"></select>
<select id="subIssue" onchange="loadParts()"></select>

<select id="tier" onchange="loadParts()">
<option value="T1">Tier 1</option>
<option value="T2">Tier 2</option>
</select>

<div id="parts"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<h2 id="total">₹ 0</h2>
</div>

</div>

<script>

let DB = [];
let cart = [];

// 🔥 LOAD EXCEL
fetch('data.xlsx')
.then(res => res.arrayBuffer())
.then(data => {
    const workbook = XLSX.read(data);
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    DB = XLSX.utils.sheet_to_json(sheet);
    init();
});

// INIT
function init() {
    const devices = [...new Set(DB.map(d => d.Device))];
    device.innerHTML = '<option>Select Device</option>';
    devices.forEach(d => device.innerHTML += `<option>${d}</option>`);
}

// LOAD ISSUES
function loadIssues() {
    const d = device.value;
    const issues = [...new Set(DB.filter(x => x.Device === d).map(x => x.Issue))];

    issue.innerHTML = '<option>Select Issue</option>';
    issues.forEach(i => issue.innerHTML += `<option>${i}</option>`);
}

// LOAD SUB ISSUES
function loadSubIssues() {
    const d = device.value;
    const i = issue.value;

    const sub = [...new Set(
        DB.filter(x => x.Device === d && x.Issue === i)
        .map(x => x.SubIssue)
    )];

    subIssue.innerHTML = '<option>Select SubIssue</option>';
    sub.forEach(s => subIssue.innerHTML += `<option>${s}</option>`);
}

// LOAD PARTS
function loadParts() {
    const d = device.value;
    const i = issue.value;
    const s = subIssue.value;
    const tierVal = tier.value;

    const filtered = DB.filter(x =>
        x.Device === d &&
        x.Issue === i &&
        x.SubIssue === s
    );

    const container = document.getElementById("parts");
    container.innerHTML = "<h3>Parts</h3>";

    filtered.forEach(p => {
        const price = p[tierVal];

        container.innerHTML += `
            <div class="part">
                ${p.Part} - ₹${price}
                <button onclick="addToCart('${p.Part}', ${price}, ${p.GST || 0})">Add</button>
            </div>
        `;
    });
}

// ADD TO CART
function addToCart(name, price, gst) {
    const existing = cart.find(i => i.name === name);

    if (existing) {
        existing.qty++;
    } else {
        cart.push({ name, price, qty:1, gst });
    }

    renderCart();
}

// REMOVE
function removeItem(name) {
    cart = cart.filter(i => i.name !== name);
    renderCart();
}

// QTY CHANGE
function changeQty(name, d) {
    const item = cart.find(i => i.name === name);
    item.qty += d;
    if(item.qty <= 0) removeItem(name);
    renderCart();
}

// RENDER CART
function renderCart() {
    let total = 0;
    const container = document.getElementById("cartItems");
    container.innerHTML = "";

    cart.forEach(item => {
        const gstMul = 1 + item.gst;
        const itemTotal = item.price * item.qty * gstMul;
        total += itemTotal;

        container.innerHTML += `
            <div class="cart-item">
                ${item.name} × ${item.qty} = ₹${Math.round(itemTotal)}
                <div>
                    <button onclick="changeQty('${item.name}',-1)">-</button>
                    <button onclick="changeQty('${item.name}',1)">+</button>
                    <button onclick="removeItem('${item.name}')">x</button>
                </div>
            </div>
        `;
    });

    document.getElementById("total").innerText = "₹ " + Math.round(total);
}

</script>

</body>
</html>
